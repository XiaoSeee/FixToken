<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FixToken</title>
  <link rel="stylesheet" href="sidepanel-lite.css">
</head>

<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">SUB2API OAuth 修复</p>
        <h1>FixToken</h1>
      </div>
      <button id="btn-stop" class="icon-button danger" type="button" title="停止当前自动流程" aria-label="停止当前自动流程">
        <span aria-hidden="true">■</span>
      </button>
    </header>

    <section class="section-panel collapsible" id="card-sub2api">
      <div class="section-title-row">
        <button class="collapse-toggle" type="button" aria-expanded="true" aria-controls="card-sub2api-body" data-collapse-target="card-sub2api">
          <span class="collapse-chevron" aria-hidden="true">▾</span>
          <span class="collapse-title">
            <h2>SUB2API</h2>
            <p>用于登录后台、查询错误账号，并把新 OAuth 凭据写回原账号。</p>
          </span>
        </button>
        <span id="save-status" class="status-pill">未保存</span>
      </div>

      <div class="section-body" id="card-sub2api-body">
        <label class="field">
          <span>后台地址</span>
          <input id="input-sub2api-url" type="url" autocomplete="off" placeholder="https://your-sub2api-domain">
        </label>

        <div class="field-grid">
          <label class="field">
            <span>账号邮箱</span>
            <input id="input-sub2api-email" type="email" autocomplete="username" placeholder="admin@example.com">
          </label>
          <label class="field">
            <span>账号密码</span>
            <input id="input-sub2api-password" type="password" autocomplete="current-password" placeholder="SUB2API 登录密码">
          </label>
        </div>

        <label class="field">
          <span>OpenAI 登录密码</span>
          <input id="input-openai-password" type="password" autocomplete="off" placeholder="用于登录待重新授权的 OpenAI 账号">
        </label>

        <div class="field-grid">
          <label class="field">
            <span>OpenAI 分组</span>
            <input id="input-sub2api-group" type="text" autocomplete="off" placeholder="codex">
          </label>
          <label class="field">
            <span>默认代理</span>
            <input id="input-sub2api-proxy" type="text" autocomplete="off" placeholder="留空不使用代理，或填写名称 / ID">
          </label>
        </div>
      </div>
    </section>

    <section class="section-panel collapsible" id="card-temp-email">
      <div class="section-title-row">
        <button class="collapse-toggle" type="button" aria-expanded="true" aria-controls="card-temp-email-body" data-collapse-target="card-temp-email">
          <span class="collapse-chevron" aria-hidden="true">▾</span>
          <span class="collapse-title">
            <h2>Cloudflare Temp Email</h2>
            <p>OAuth 登录验证码会继续复用原插件的 Cloudflare Temp Email 轮询能力。</p>
          </span>
        </button>
      </div>

      <div class="section-body" id="card-temp-email-body">
        <label class="field">
          <span>服务地址</span>
          <input id="input-temp-base-url" type="url" autocomplete="off" placeholder="https://temp-email.example.com">
        </label>

        <div class="field-grid">
          <label class="field">
            <span>Admin Auth</span>
            <input id="input-temp-admin-auth" type="password" autocomplete="off" placeholder="可留空">
          </label>
          <label class="field">
            <span>Custom Auth</span>
            <input id="input-temp-custom-auth" type="password" autocomplete="off" placeholder="可留空">
          </label>
        </div>

        <div class="field-grid">
          <label class="field">
            <span>查询模式</span>
            <select id="select-temp-lookup-mode">
              <option value="receive-mailbox">按接收邮箱查询</option>
              <option value="registration-email">按注册邮箱查询</option>
            </select>
          </label>
          <label class="field">
            <span>接收邮箱</span>
            <input id="input-temp-receive-mailbox" type="email" autocomplete="off" placeholder="forward@example.com">
          </label>
        </div>

        <div class="field-grid">
          <label class="field">
            <span>当前域名</span>
            <input id="input-temp-domain" type="text" autocomplete="off" placeholder="mail.example.com">
          </label>
          <label class="field">
            <span>域名列表</span>
            <input id="input-temp-domains" type="text" autocomplete="off" placeholder="mail.example.com, alt.example.com">
          </label>
        </div>

        <label class="check-row">
          <input id="input-temp-random-subdomain" type="checkbox">
          <span>注册邮箱使用随机子域名</span>
        </label>
      </div>
    </section>

    <section class="section-panel reauth-panel">
      <div class="section-title-row">
        <div>
          <h2>错误账号</h2>
          <p>先获取 SUB2API 中状态为 error 的 OpenAI 账号，再选择需要重新授权的账号。</p>
        </div>
        <div class="action-row">
          <button id="btn-select-all-accounts" class="button secondary" type="button" disabled>全选</button>
          <button id="btn-select-empty-accounts" class="button secondary" type="button" disabled>选空记录</button>
          <button id="btn-select-failed-accounts" class="button secondary" type="button" disabled>选失败记录</button>
          <button id="btn-deselect-all-accounts" class="button secondary" type="button" disabled>取消选中</button>
          <button id="btn-fetch-accounts" class="button secondary" type="button">获取账号</button>
          <button id="btn-reset-step" class="button secondary" type="button">重置当前步骤</button>
          <button id="btn-start-reauth" class="button primary" type="button" disabled>开始授权</button>
        </div>
      </div>

      <div id="account-summary" class="summary-line">尚未加载错误账号。</div>
      <div id="account-list" class="account-list" aria-live="polite">
        <div class="empty-state">点击“获取账号”后，这里会显示待处理账号。</div>
      </div>
    </section>

    <section class="section-panel log-panel">
      <div class="section-title-row">
        <div>
          <h2>运行日志</h2>
          <p>后台 OAuth、验证码和写回动作会实时出现在这里。</p>
        </div>
        <button id="btn-refresh-state" class="button secondary" type="button">刷新</button>
      </div>
      <div id="log-area" class="log-area" aria-live="polite"></div>
    </section>
  </main>

  <script src="sidepanel-lite.js"></script>
</body>

</html>
